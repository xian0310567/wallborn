<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wallborn Test Launcher</title>
    <style>
      body { margin: 0; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #111827; color: #e5e7eb; }
      main { max-width: 760px; margin: 0 auto; padding: 32px; }
      h1 { margin: 0 0 8px; }
      .card { background: #1f2937; border: 1px solid #374151; border-radius: 14px; padding: 18px; margin: 16px 0; }
      button { background: #10b981; color: #06251a; border: 0; border-radius: 10px; padding: 10px 14px; font-weight: 700; margin: 4px; cursor: pointer; }
      button.secondary { background: #60a5fa; color: #081526; }
      input { width: 100%; box-sizing: border-box; background: #0f172a; color: #e5e7eb; border: 1px solid #475569; border-radius: 10px; padding: 10px; }
      pre { white-space: pre-wrap; background: #0f172a; border-radius: 10px; padding: 12px; min-height: 100px; }
      .muted { color: #9ca3af; }
    </style>
  </head>
  <body>
    <main>
      <h1>Wallborn Test Launcher 🧱</h1>
      <p class="muted">GitHub Release의 최신 테스트 빌드를 받아 실행하는 내부 런처.</p>

      <section class="card">
        <h2>GitHub 접근</h2>
        <p>Private repo라 읽기 권한 토큰이 필요해. 토큰 상태: <strong id="token-state">확인 중</strong></p>
        <input id="token" type="password" placeholder="GitHub token" />
        <button id="save-token">토큰 저장</button>
      </section>

      <section class="card">
        <h2>빌드</h2>
        <p>설치된 빌드: <strong id="installed">확인 중</strong></p>
        <button id="check" class="secondary">최신 빌드 확인</button>
        <button id="update">업데이트</button>
        <button id="launch">실행</button>
        <button id="open-folder" class="secondary">런처 폴더 열기</button>
      </section>

      <section class="card">
        <h2>상태</h2>
        <p id="status">준비됨</p>
        <pre id="release"></pre>
      </section>
    </main>
    <script src="renderer.js"></script>
  </body>
</html>
